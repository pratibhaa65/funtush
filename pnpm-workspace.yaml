# pnpm workspace definition.
# Tenant-facing apps live under apps/*, shared libraries under packages/*,
# and cross-cutting tooling (tsconfig, eslint) under config/.
packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  prisma: true
